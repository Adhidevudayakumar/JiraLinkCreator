<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jira Link Creator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: white;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #666;
      margin-bottom: 24px;
    }

    input,
    button {
      width: 100%;
      padding: 14px;
      margin-bottom: 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    #preview {
      margin-top: 24px;
      padding: 18px;
      border: 1px solid #ddd;
      border-radius: 12px;
      background: #fafafa;
      max-height: 350px;
      overflow-y: auto;
    }

    #preview a {
      display: block;
      margin-bottom: 10px;
      color: #2563eb;
      text-decoration: none;
    }

    #preview a:hover {
      text-decoration: underline;
    }

    .success {
      margin-top: 10px;
      color: green;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>CSV → Jira Hyperlinks</h1>

  <p>
    Upload CSV and generate copy-pasteable clickable Jira links.
  </p>

  <input
    type="text"
    id="jiraBase"
    value="https://newagesmb.atlassian.net/browse/"
  />

  <input
    type="file"
    id="csvFile"
    accept=".csv"
  />

  <button id="generateBtn">
    Generate Links
  </button>

  <button id="copyBtn">
    Copy Rich Hyperlinks
  </button>

  <div id="preview"></div>

  <div class="success" id="status"></div>
</div>

<script>
  let generatedHTML = '';

  const generateBtn = document.getElementById('generateBtn');
  const copyBtn = document.getElementById('copyBtn');
  const preview = document.getElementById('preview');
  const status = document.getElementById('status');

  generateBtn.addEventListener('click', generateLinks);
  copyBtn.addEventListener('click', copyRichLinks);

  function generateLinks() {
    const fileInput = document.getElementById('csvFile');
    const jiraBase = document.getElementById('jiraBase').value.trim();

    status.textContent = '';

    if (!fileInput.files.length) {
      alert('Please upload a CSV file');
      return;
    }

    const file = fileInput.files[0];

    const reader = new FileReader();

    reader.onload = function(event) {
      const text = event.target.result;

      const matches = text.match(/[A-Z]+-\d+/g) || [];

      const uniqueIds = [...new Set(matches)];

      generatedHTML = uniqueIds
        .map(id => {
          const url = jiraBase + id;

          return `
            <div>
              <a href="${url}" target="_blank">
                ${id}
              </a>
            </div>
          `;
        })
        .join('');

      preview.innerHTML = generatedHTML;
    };

    reader.readAsText(file);
  }

  async function copyRichLinks() {
    if (!generatedHTML) {
      alert('Generate links first');
      return;
    }

    try {
      const blob = new Blob(
        [generatedHTML],
        { type: 'text/html' }
      );

      const clipboardItem = new ClipboardItem({
        'text/html': blob
      });

      await navigator.clipboard.write([clipboardItem]);

      status.textContent = 'Hyperlinks copied successfully!';
    } catch (error) {
      console.error(error);

      alert(
        'Clipboard copy failed. Open using localhost or HTTPS.'
      );
    }
  }
</script>

</body>
</html>
